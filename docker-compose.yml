# 開發環境: docker-compose --profile dev up --build
# 正式環境: docker-compose --profile prod up  (需先 cd frontend && ng build)

services:

  # ── 開發環境 ──────────────────────────────────────────────────────────────
  backend-dev:
    profiles: [dev]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: claude-desktop-backend-dev
    ports:
      - "8765:8765"
    volumes:
      - ./backend:/app
      - type: bind
        source: ${CLAUDE_HOME}
        target: /root/.claude
    environment:
      - CLAUDE_BIN=claude
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/status')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend-dev:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: claude-desktop-frontend-dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=2000
    depends_on:
      backend-dev:
        condition: service_healthy
    restart: unless-stopped

  # ── 正式環境 ──────────────────────────────────────────────────────────────
  backend:
    profiles: [prod]
    build: ./backend
    container_name: claude-desktop-backend
    ports:
      - "8765:8765"
    volumes:
      - type: bind
        source: ${CLAUDE_HOME}
        target: /root/.claude
    environment:
      - CLAUDE_BIN=claude
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/status')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    profiles: [prod]
    image: nginx:alpine
    container_name: claude-desktop-frontend
    ports:
      - "4200:80"
    volumes:
      - ./frontend/dist/frontend/browser:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ngrok:
    profiles: [prod]
    image: ngrok/ngrok:latest
    container_name: claude-desktop-ngrok
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http backend:8765 --log stdout
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  frontend_node_modules:
