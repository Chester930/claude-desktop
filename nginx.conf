server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 健檢第二輪修復：原本完全沒有任何安全性 header。這個 build 沒有用到
    # 外部 CDN／字型／inline script（AOT build，唯一的 script 是本機打包的
    # main-*.js），Angular 元件樣式會用 JS 動態插入 <style>，所以
    # style-src 需要 unsafe-inline。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location /api/ {
        proxy_pass http://backend:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
